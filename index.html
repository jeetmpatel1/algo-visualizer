<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water & Histogram Algorithm Visualizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
.header{text-align:center;padding:20px;background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:2px solid #0f3460}
.header h1{font-size:1.8rem;background:linear-gradient(90deg,#00d2ff,#7b2ff7,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:#888;margin-top:4px;font-size:.9rem}
.controls{display:flex;justify-content:center;align-items:center;gap:12px;padding:16px;flex-wrap:wrap;background:#1a1a2e}
.controls label{font-size:.85rem;color:#aaa}
.controls input[type=text]{background:#0f0f1a;border:1px solid #333;color:#fff;padding:8px 14px;border-radius:6px;width:280px;font-size:.95rem}
.controls input[type=range]{width:140px;accent-color:#7b2ff7}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;transition:all .2s}
.btn-run{background:linear-gradient(135deg,#00d2ff,#7b2ff7);color:#fff}
.btn-run:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(123,47,247,.4)}
.btn-reset{background:#333;color:#ccc}
.btn-reset:hover{background:#444}
.btn-step{background:linear-gradient(135deg,#f7971e,#ffd200);color:#000}
.btn-step:hover{transform:translateY(-1px)}
.panels{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;max-width:1600px;margin:0 auto}
.panel{background:#1a1a2e;border-radius:12px;border:1px solid #2a2a4a;overflow:hidden;display:flex;flex-direction:column}
.panel-header{padding:12px 16px;font-weight:700;font-size:1rem;display:flex;justify-content:space-between;align-items:center}
.panel-header .result{font-size:.85rem;padding:4px 10px;border-radius:20px;font-weight:600}
.p1 .panel-header{background:linear-gradient(90deg,#0f3460,#16213e);border-bottom:2px solid #00d2ff}
.p1 .result{background:rgba(0,210,255,.15);color:#00d2ff}
.p2 .panel-header{background:linear-gradient(90deg,#1a0f3e,#1e1640);border-bottom:2px solid #7b2ff7}
.p2 .result{background:rgba(123,47,247,.15);color:#b388ff}
.p3 .panel-header{background:linear-gradient(90deg,#3e0f0f,#401616);border-bottom:2px solid #ff6b6b}
.p3 .result{background:rgba(255,107,107,.15);color:#ff6b6b}
.canvas-wrap{flex:1;padding:12px;min-height:320px;position:relative}
canvas{width:100%;height:100%;border-radius:8px;background:#12121e}
.log{height:140px;overflow-y:auto;padding:10px 14px;font-family:'Fira Code',monospace;font-size:.75rem;line-height:1.6;background:#0a0a14;border-top:1px solid #2a2a4a;color:#888}
.log .step{color:#ccc}.log .highlight{color:#ffd200}.log .water{color:#00d2ff}.log .rect{color:#ff6b6b}.log .push{color:#7b2ff7}.log .pop{color:#ff6b6b}
.legend{display:flex;gap:16px;justify-content:center;padding:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.75rem;color:#888}
.legend-item span{width:14px;height:14px;border-radius:3px;display:inline-block}
@media(max-width:1100px){.panels{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1>Container Water · Trapping Rain Water · Largest Rectangle</h1>
  <p>Side-by-side algorithm visualization with step-by-step animation</p>
</div>
<div class="controls">
  <label>Heights:</label>
  <input type="text" id="inputArr" value="5,4,4,5">
  <button class="btn btn-run" onclick="runAll()">▶ Animate All</button>
  <button class="btn btn-step" onclick="stepAll()">⏭ Step</button>
  <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
  <label>Speed:</label>
  <input type="range" id="speed" min="50" max="800" value="400">
  <span id="speedLabel">400ms</span>
</div>
<div class="legend">
  <div class="legend-item"><span style="background:#00d2ff"></span>Water / Area</div>
  <div class="legend-item"><span style="background:#ffd200"></span>Active Pointers</div>
  <div class="legend-item"><span style="background:#7b2ff7"></span>Stack Elements</div>
  <div class="legend-item"><span style="background:#ff6b6b"></span>Max Rectangle</div>
  <div class="legend-item"><span style="background:#555"></span>Bars</div>
</div>
<div class="panels">
  <div class="panel p1">
    <div class="panel-header">Container With Most Water <span class="result" id="res1">Area: 0</span></div>
    <div class="canvas-wrap"><canvas id="c1"></canvas></div>
    <div class="log" id="log1"></div>
  </div>
  <div class="panel p2">
    <div class="panel-header">Trapping Rain Water <span class="result" id="res2">Water: 0</span></div>
    <div class="canvas-wrap"><canvas id="c2"></canvas></div>
    <div class="log" id="log2"></div>
  </div>
  <div class="panel p3">
    <div class="panel-header">Largest Rectangle in Histogram <span class="result" id="res3">Area: 0</span></div>
    <div class="canvas-wrap"><canvas id="c3"></canvas></div>
    <div class="log" id="log3"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const speedEl = $('speed');
speedEl.oninput = () => $('speedLabel').textContent = speedEl.value + 'ms';

let heights = [], animating = false, stepMode = false, stepResolve = null;
let abortCtrl = null;

function parseInput() {
  return $('inputArr').value.split(/[\s,\[\]]+/).filter(Boolean).map(Number).filter(n => !isNaN(n) && n >= 0);
}

function delay(ms, signal) {
  return new Promise((res, rej) => {
    const t = setTimeout(res, ms);
    if (signal) signal.addEventListener('abort', () => { clearTimeout(t); rej('abort'); });
  });
}

function waitStep(signal) {
  if (!stepMode) return delay(+speedEl.value, signal);
  return new Promise((res, rej) => {
    stepResolve = res;
    if (signal) signal.addEventListener('abort', () => { stepResolve = null; rej('abort'); });
  });
}

function stepAll() {
  if (stepResolve) { const r = stepResolve; stepResolve = null; r(); }
}

function log(id, html) {
  const el = $(id);
  el.innerHTML += html + '<br>';
  el.scrollTop = el.scrollHeight;
}

// ─── Drawing helpers ───
function setupCanvas(canvas) {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width * 2; canvas.height = r.height * 2;
  canvas.style.width = r.width + 'px'; canvas.style.height = r.height + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(2, 2);
  return { ctx, w: r.width, h: r.height };
}

function drawBars(ctx, w, h, arr, opts = {}) {
  const { pointers = [], stackSet = new Set(), waterLevels = [], filledWater = [], maxRect = null, maxRectBars = new Set() } = opts;
  const maxH = Math.max(...arr, 1);
  const pad = 30, bottom = h - 25, top = 15;
  const usable = bottom - top;
  const barW = Math.min(40, (w - pad * 2) / arr.length * 0.7);
  const gap = (w - pad * 2) / arr.length;

  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = '#1e1e30'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = bottom - (usable * i / 4);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - 10, y); ctx.stroke();
    ctx.fillStyle = '#444'; ctx.font = '9px monospace';
    ctx.fillText((maxH * i / 4).toFixed(0), 4, y + 3);
  }

  // Water fill
  filledWater.forEach(({ i, level }) => {
    const x = pad + i * gap + (gap - barW) / 2;
    const barH = (arr[i] / maxH) * usable;
    const waterH = (level / maxH) * usable;
    if (waterH > barH) {
      ctx.fillStyle = 'rgba(0,210,255,0.25)';
      ctx.fillRect(x, bottom - waterH, barW, waterH - barH);
    }
  });

  // Water level lines (container)
  waterLevels.forEach(({ l, r: ri, level }) => {
    const x1 = pad + l * gap + gap / 2;
    const x2 = pad + ri * gap + gap / 2;
    const y = bottom - (level / maxH) * usable;
    ctx.strokeStyle = 'rgba(0,210,255,0.5)'; ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]); ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,210,255,0.08)';
    ctx.fillRect(x1, y, x2 - x1, bottom - y);
  });

  // Max rectangle highlight
  if (maxRect) {
    const { left, right, height: rh } = maxRect;
    const x1 = pad + left * gap + (gap - barW) / 2;
    const x2 = pad + right * gap + (gap - barW) / 2 + barW;
    const ry = bottom - (rh / maxH) * usable;
    ctx.fillStyle = 'rgba(255,107,107,0.15)';
    ctx.fillRect(x1, ry, x2 - x1, bottom - ry);
    ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 1.5;
    ctx.strokeRect(x1, ry, x2 - x1, bottom - ry);
  }

  // Bars
  arr.forEach((v, i) => {
    const x = pad + i * gap + (gap - barW) / 2;
    const barH = (v / maxH) * usable;
    const isPointer = pointers.includes(i);
    const inStack = stackSet.has(i);
    const inMaxRect = maxRectBars.has(i);

    let color = '#3a3a5c';
    if (inMaxRect) color = '#ff6b6b';
    else if (isPointer) color = '#ffd200';
    else if (inStack) color = '#7b2ff7';

    // Bar shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x + 2, bottom - barH + 2, barW, barH);

    // Bar
    const grad = ctx.createLinearGradient(x, bottom - barH, x, bottom);
    grad.addColorStop(0, color);
    grad.addColorStop(1, shadeColor(color, -30));
    ctx.fillStyle = grad;
    ctx.fillRect(x, bottom - barH, barW, barH);

    // Bar border
    ctx.strokeStyle = isPointer ? '#fff' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isPointer ? 1.5 : 0.5;
    ctx.strokeRect(x, bottom - barH, barW, barH);

    // Index label
    ctx.fillStyle = '#666'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(i, x + barW / 2, bottom + 12);

    // Value label
    ctx.fillStyle = isPointer ? '#ffd200' : '#aaa'; ctx.font = '10px monospace';
    ctx.fillText(v, x + barW / 2, bottom - barH - 5);

    // Pointer arrows
    if (isPointer) {
      const pi = pointers.indexOf(i);
      ctx.fillStyle = '#ffd200'; ctx.font = 'bold 10px sans-serif';
      const label = pointers.length === 2 ? (pi === 0 ? 'L' : 'R') : 'i';
      ctx.fillText(label, x + barW / 2, bottom + 23);
    }
  });
  ctx.textAlign = 'start';
}

function shadeColor(hex, pct) {
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + pct)); g = Math.max(0, Math.min(255, g + pct)); b = Math.max(0, Math.min(255, b + pct));
  return `rgb(${r},${g},${b})`;
}

// ─── Algorithm 1: Container With Most Water ───
async function runContainer(arr, signal) {
  const canvas = $('c1');
  const { ctx, w, h } = setupCanvas(canvas);
  let l = 0, r = arr.length - 1, maxArea = 0, bestL = 0, bestR = 0;

  log('log1', '<span class="step">Starting two-pointer approach: L=0, R=' + (arr.length - 1) + '</span>');

  while (l < r) {
    signal.throwIfAborted?.();
    const area = Math.min(arr[l], arr[r]) * (r - l);
    const waterLevel = Math.min(arr[l], arr[r]);

    drawBars(ctx, w, h, arr, {
      pointers: [l, r],
      waterLevels: [{ l, r, level: waterLevel }]
    });

    log('log1', `<span class="step">L=${l} R=${r} → min(${arr[l]},${arr[r]})×${r - l} = <span class="highlight">${area}</span></span>`);

    if (area > maxArea) {
      maxArea = area; bestL = l; bestR = r;
      log('log1', `<span class="water">★ New max area: ${maxArea}</span>`);
      $('res1').textContent = 'Area: ' + maxArea;
    }

    await waitStep(signal);

    if (arr[l] <= arr[r]) {
      log('log1', `<span class="step">arr[L]=${arr[l]} ≤ arr[R]=${arr[r]} → move L right</span>`);
      l++;
    } else {
      log('log1', `<span class="step">arr[L]=${arr[l]} > arr[R]=${arr[r]} → move R left</span>`);
      r--;
    }
  }

  drawBars(ctx, w, h, arr, {
    pointers: [bestL, bestR],
    waterLevels: [{ l: bestL, r: bestR, level: Math.min(arr[bestL], arr[bestR]) }]
  });
  log('log1', `<span class="water">✓ Final answer: ${maxArea} (between indices ${bestL} and ${bestR})</span>`);
  $('res1').textContent = 'Area: ' + maxArea;
}

// ─── Algorithm 2: Trapping Rain Water ───
async function runTrapping(arr, signal) {
  const canvas = $('c2');
  const { ctx, w, h } = setupCanvas(canvas);
  let l = 0, r = arr.length - 1, lMax = 0, rMax = 0, water = 0;
  const filled = [];

  log('log2', '<span class="step">Two-pointer approach: L=0, R=' + (arr.length - 1) + ', leftMax=0, rightMax=0</span>');

  while (l <= r) {
    signal.throwIfAborted?.();

    if (arr[l] <= arr[r]) {
      if (arr[l] >= lMax) {
        lMax = arr[l];
        log('log2', `<span class="step">L=${l}: height ${arr[l]} ≥ leftMax → update leftMax=${lMax}</span>`);
      } else {
        const trapped = lMax - arr[l];
        water += trapped;
        filled.push({ i: l, level: lMax });
        log('log2', `<span class="push">L=${l}: trap ${lMax}-${arr[l]}=<span class="highlight">${trapped}</span> water (total: ${water})</span>`);
      }

      drawBars(ctx, w, h, arr, { pointers: [l, r], filledWater: [...filled] });
      await waitStep(signal);
      l++;
    } else {
      if (arr[r] >= rMax) {
        rMax = arr[r];
        log('log2', `<span class="step">R=${r}: height ${arr[r]} ≥ rightMax → update rightMax=${rMax}</span>`);
      } else {
        const trapped = rMax - arr[r];
        water += trapped;
        filled.push({ i: r, level: rMax });
        log('log2', `<span class="push">R=${r}: trap ${rMax}-${arr[r]}=<span class="highlight">${trapped}</span> water (total: ${water})</span>`);
      }

      drawBars(ctx, w, h, arr, { pointers: [l, r], filledWater: [...filled] });
      await waitStep(signal);
      r--;
    }

    $('res2').textContent = 'Water: ' + water;
  }

  drawBars(ctx, w, h, arr, { filledWater: filled });
  log('log2', `<span class="water">✓ Final answer: ${water} units of trapped water</span>`);
}

// ─── Algorithm 3: Largest Rectangle in Histogram ───
async function runHistogram(arr, signal) {
  const canvas = $('c3');
  const { ctx, w, h } = setupCanvas(canvas);
  const stack = [];
  let maxArea = 0, bestL = 0, bestR = 0, bestH = 0;

  log('log3', '<span class="step">Stack-based approach: scanning left to right</span>');

  for (let i = 0; i <= arr.length; i++) {
    signal.throwIfAborted?.();
    const curH = i === arr.length ? 0 : arr[i];

    while (stack.length && arr[stack[stack.length - 1]] > curH) {
      const top = stack.pop();
      const height = arr[top];
      const width = stack.length ? i - stack[stack.length - 1] - 1 : i;
      const area = height * width;
      const left = stack.length ? stack[stack.length - 1] + 1 : 0;

      log('log3', `<span class="pop">Pop idx ${top}: h=${height} w=${width} → area=<span class="highlight">${area}</span></span>`);

      if (area > maxArea) {
        maxArea = area; bestL = left; bestR = i - 1; bestH = height;
        log('log3', `<span class="rect">★ New max rectangle: ${maxArea}</span>`);
        $('res3').textContent = 'Area: ' + maxArea;
      }

      const maxRectBars = new Set();
      for (let j = left; j < i; j++) maxRectBars.add(j);

      drawBars(ctx, w, h, arr, {
        pointers: [i < arr.length ? i : -1].filter(x => x >= 0),
        stackSet: new Set(stack),
        maxRect: { left, right: i - 1, height },
        maxRectBars
      });
      await waitStep(signal);
    }

    stack.push(i);
    if (i < arr.length) {
      log('log3', `<span class="push">Push idx ${i} (h=${arr[i]}) → stack=[${stack.join(',')}]</span>`);
    }

    drawBars(ctx, w, h, arr, {
      pointers: [i < arr.length ? i : -1].filter(x => x >= 0),
      stackSet: new Set(stack)
    });
    if (i < arr.length) await waitStep(signal);
  }

  const bestBars = new Set();
  for (let j = bestL; j <= bestR; j++) bestBars.add(j);
  drawBars(ctx, w, h, arr, {
    maxRect: { left: bestL, right: bestR, height: bestH },
    maxRectBars: bestBars
  });
  log('log3', `<span class="rect">✓ Final answer: ${maxArea} (indices ${bestL}–${bestR}, height ${bestH})</span>`);
}

// ─── Controls ───
async function runAll() {
  if (animating) return;
  resetAll();
  heights = parseInput();
  if (heights.length < 2) { alert('Need at least 2 values'); return; }

  animating = true; stepMode = false;
  abortCtrl = new AbortController();
  const signal = abortCtrl.signal;

  try {
    await Promise.all([
      runContainer([...heights], signal),
      runTrapping([...heights], signal),
      runHistogram([...heights], signal)
    ]);
  } catch (e) { if (e !== 'abort') console.error(e); }
  animating = false;
}

function resetAll() {
  if (abortCtrl) abortCtrl.abort();
  animating = false; stepMode = false; stepResolve = null;
  ['log1', 'log2', 'log3'].forEach(id => $(id).innerHTML = '');
  $('res1').textContent = 'Area: 0';
  $('res2').textContent = 'Water: 0';
  $('res3').textContent = 'Area: 0';

  heights = parseInput();
  if (heights.length >= 2) {
    [['c1'], ['c2'], ['c3']].forEach(([cid]) => {
      const canvas = $(cid);
      const { ctx, w, h } = setupCanvas(canvas);
      drawBars(ctx, w, h, heights);
    });
  }
}

// Step mode: run with manual stepping
$('speed').addEventListener('input', () => {
  $('speedLabel').textContent = speedEl.value + 'ms';
});

// Handle step button starting animation in step mode
document.querySelector('.btn-step').addEventListener('click', () => {
  if (!animating) {
    heights = parseInput();
    if (heights.length < 2) { alert('Need at least 2 values'); return; }
    resetAll();
    animating = true; stepMode = true;
    abortCtrl = new AbortController();
    const signal = abortCtrl.signal;
    Promise.all([
      runContainer([...heights], signal),
      runTrapping([...heights], signal),
      runHistogram([...heights], signal)
    ]).catch(e => { if (e !== 'abort') console.error(e); }).finally(() => animating = false);
  }
}, { once: false });

// Override the stepAll to not double-fire
document.querySelector('.btn-step').onclick = null;

// Init
window.addEventListener('load', resetAll);
window.addEventListener('resize', () => { if (!animating) resetAll(); });
</script>
</body>
</html>
